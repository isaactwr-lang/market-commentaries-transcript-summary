name: Market Commentaries — Daily Video Check

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC = 08:00 SGT, daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-new-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
        run: python agents/check_new_video.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_video.json
          git diff --cached --quiet || git commit -m "chore: update last seen video $(date -u +%Y-%m-%d)"
          git push
